name: ANGRON - F04_NAILS Finish

on:
  workflow_dispatch:

jobs:
  nails:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Run finish.sh F04_NAILS
        run: |
          mkdir -p F04_NAILS/OUT
          chmod +x F04_NAILS/CODEBASE/finish.sh
          bash F04_NAILS/CODEBASE/finish.sh \
            --video F03_CRUOR/OUT/cruor_render_001.mp4 \
            --audio "F02_LACERAT/IN/Generated-Audio-June-14_-2026-8_19AM.mp3" \
            --format short \
            --output F04_NAILS/OUT/nails_out_001.mp4
          ls -lh F04_NAILS/OUT/

      - name: Mettre a jour ledger STATE_7_DONE
        run: |
          python3 -c "import json,datetime; f=open('.angron/ledger.json'); l=json.load(f); f.close(); l['projet_actif']['etape']='STATE_7_DONE'; l['projet_actif']['fichiers']['nails_out']='F04_NAILS/OUT/nails_out_001.mp4'; l['projet_actif']['derniere_mise_a_jour']=datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'); f=open('.angron/ledger.json','w'); json.dump(l,f,indent=2,ensure_ascii=False); f.close(); print('Ledger STATE_7_DONE OK')"

      - name: Commit nails_out et ledger
        run: |
          git config user.name "ANGRON-NAILS"
          git config user.email "nails@angron.bot"
          git add F04_NAILS/OUT/nails_out_001.mp4 F04_NAILS/OUT/NAILS_DONE.txt .angron/ledger.json
          git diff --cached --quiet || git commit -m "ANGRON 001 - STATE_7_DONE : fusion audio+video NAILS OK"
          git push
